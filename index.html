<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Pink Spin Wheel</title>

<link rel="stylesheet" href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap"
rel="stylesheet">
</head>

<body>

<div class="widget-container">
    
    <div class="wheel-wrapper">

        <div class="pointer"></div>

        <svg
            id="wheel"
            viewBox="-300 -300 600 600">
        </svg>

        <button id="spinBtn">
            SPIN
        </button>

    </div>

    <button id="editBtn">
        Edit Labels
    </button>

</div>


<div id="overlay">

    <div id="editorBox">

        <h3>Edit Label</h3>

        <input
            id="labelInput"
            type="text"
        >

        <div class="editor-buttons">

            <button id="saveLabel">
                Save
            </button>

            <button id="cancelLabel">
                Cancel
            </button>

        </div>

    </div>

</div>
    
<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
