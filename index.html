<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Wheel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="widget">

    <div class="wheel-container">

        <div class="pointer"></div>

        <canvas
            id="wheel"
            width="1000"
            height="1000">
        </canvas>

        <button
            id="spinBtn"
            class="center-btn">
        </button>

    </div>

    <button
        id="editBtn"
        class="edit-btn">
        Edit Labels
    </button>

    <div
        id="labelEditor"
        class="label-editor hidden">

        <input
            id="labelInput"
            type="text"
            maxlength="40">

        <button id="saveLabel">
            Save
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
